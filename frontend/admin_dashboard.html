<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - DocAssist</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#060913;--card:#0f1523;--text:#fff;--muted:#9ca3af;--accent:#3b82f6;--border:#1e293b}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}
    body{background:var(--bg);color:var(--text);min-height:100vh}
    header{display:flex;justify-content:space-between;align-items:center;padding:18px 5%;border-bottom:1px solid var(--border)}
    .container{max-width:1000px;margin:36px auto;padding:20px}
    .card{background:var(--card);border:1px solid var(--border);padding:16px;border-radius:10px}
    .grid{display:grid;grid-template-columns:1fr 320px;gap:16px}
    .btn{background:var(--accent);color:#fff;padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
    .link-back{background:transparent;border:1px solid var(--border);padding:8px 12px;border-radius:8px;color:var(--muted);text-decoration:none}
    .list-item{padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.02);margin-bottom:8px;display:flex;justify-content:space-between;gap:12px}
    .small{color:var(--muted);font-size:0.9rem}
    /* modal */
    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);}
    .modal.open{display:flex}
    .modal .panel{background:var(--card);padding:16px;border-radius:10px;width:420px}
    label{display:block;margin-top:8px;color:var(--muted)}
    input[type=text], input[type=file]{width:100%;padding:8px;margin-top:6px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text)}
  </style>
</head>
<body>
  <header>
    <div style="font-weight:700">DocAssist — Área Administrativa</div>
    <nav>
      <a href="admin.html" class="link-back">Sair</a>
    </nav>
  </header>

  <main class="container">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3>Documentos upados</h3>
        <div>
          <button id="btnUpload" class="btn">Novo Upload</button>
        </div>
      </div>

      <div id="list" class="small"></div>
    </div>
  </main>

  <div id="modal" class="modal">
    <div class="panel">
      <h4>Novo Upload</h4>
      <p class="small">Preencha apenas o nome do PDF e selecione o arquivo.</p>
      <form id="uploadForm">
        <label for="title">Nome do PDF</label>
        <input id="title" name="title" type="text" required>
        <label for="file">Arquivo PDF</label>
        <input id="file" name="file" type="file" accept="application/pdf" required>
        <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
          <button type="button" id="cancel" class="link-back">Cancelar</button>
          <button type="submit" class="btn">Enviar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Using IndexedDB for local storage (no backend required)
    const DB_NAME = 'docassist-db';
    const STORE_NAME = 'editais';

    function openDB(){
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if(!db.objectStoreNames.contains(STORE_NAME)){
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbAdd(item){
      const db = await openDB();
      return new Promise((resolve,reject)=>{
        const tx = db.transaction(STORE_NAME,'readwrite');
        tx.objectStore(STORE_NAME).put(item);
        tx.oncomplete = ()=> resolve(item);
        tx.onerror = ()=> reject(tx.error);
      });
    }

    async function idbGetAll(){
      const db = await openDB();
      return new Promise((resolve,reject)=>{
        const tx = db.transaction(STORE_NAME,'readonly');
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = ()=> resolve(req.result.reverse());
        req.onerror = ()=> reject(req.error);
      });
    }
    const listEl = document.getElementById('list');
    const modal = document.getElementById('modal');
    const btnUpload = document.getElementById('btnUpload');
    const cancel = document.getElementById('cancel');
    const uploadForm = document.getElementById('uploadForm');

    function render(list){
      if(!list || list.length===0){ listEl.innerHTML = '<div class="small">Nenhum documento encontrado.</div>'; return }
      listEl.innerHTML = '';
        list.forEach(item =>{
        const div = document.createElement('div');
        div.className = 'list-item';
        // create object URL for blob if present
        let url = item.path || '';
        if(!url && item.blob){
          try{ url = URL.createObjectURL(item.blob); }
          catch(e){ url = '#'; }
        }
        div.innerHTML = `
          <div>
            <div style="font-weight:600">${item.title}</div>
            <div class="small">${item.summary? item.summary : 'Resumo pendente'}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end">
            <a class="btn" href="${url}" target="_blank">Abrir PDF</a>
            <div class="small" style="margin-top:8px">${new Date(item.uploadedAt).toLocaleString()}</div>
          </div>
        `;
        listEl.appendChild(div);
      })
    }

    async function load(){
      try{
        const data = await idbGetAll();
        render(data);
      }catch(e){
        listEl.innerHTML = '<div class="small">Erro ao carregar.</div>';
      }
    }

    // polling every 5 seconds
    load();
    setInterval(load, 5000);

    btnUpload.addEventListener('click', ()=> modal.classList.add('open'));
    cancel.addEventListener('click', ()=> modal.classList.remove('open'));

    uploadForm.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const fileInput = document.getElementById('file');
      const f = fileInput.files[0];
      if(!f){ alert('Selecione um PDF'); return; }
      if(!title){ alert('Preencha o nome do PDF'); return; }
      try{
        const arrayBuffer = await f.arrayBuffer();
        const blob = new Blob([arrayBuffer], { type: f.type });
        const item = {
          id: Date.now(),
          title,
          summary: '',
          originalName: f.name,
          blob,
          path: '',
          uploadedAt: new Date().toISOString()
        };
        await idbAdd(item);
        modal.classList.remove('open');
        uploadForm.reset();
        await load();
      }catch(err){
        alert('Erro ao salvar localmente');
      }
    });
  </script>
</body>
</html>
