<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - DocAssist</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="page-admin-dashboard">
  <header class="site-header">
    <a href="site_ofc.html" class="brand-link">
      <div class="brand">
        <div class="brand-icon">
          <i class="fa-solid fa-file-lines"></i>
        </div>
        <div class="brand-copy">
          <div class="brand-title">DocAssist</div>
          <div class="brand-subtitle">Área Administrativa</div>
        </div>
      </div>
    </a>
    <nav>
      <a href="admin.html" class="link-back">Sair</a>
    </nav>
  </header>

  <main class="admin-dashboard-container">
    <div class="admin-dashboard-card">
      <div class="admin-dashboard-header">
        <h3>Documentos publicados</h3>
        <button id="btnUpload" class="btn">Novo Upload</button>
      </div>

      <div id="list" class="small"></div>
    </div>
  </main>

  <div id="modal" class="modal">
    <div class="panel">
      <h4>Novo Upload</h4>
      <p class="small">Preencha apenas o nome do PDF e selecione o arquivo.</p>
      <form id="uploadForm">
        <label for="title">Nome do PDF</label>
        <input id="title" name="name" type="text" required>
        <label for="file">Arquivo PDF</label>
        <input id="file" name="file" type="file" accept="application/pdf" required>
        <div class="modal-actions">
          <button type="button" id="cancel" class="link-back">Cancelar</button>
          <button type="submit" class="btn">Enviar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="deleteConfirmModal" class="modal">
    <div class="panel">
      <h4>Excluir documento</h4>
      <p id="deleteConfirmMessage" class="small"></p>
      <div class="modal-actions">
        <button type="button" id="cancelDelete" class="link-back">Cancelar</button>
        <button type="button" id="confirmDelete" class="btn">Excluir</button>
      </div>
    </div>
  </div>

  <script src="assets/js/admin_dashboard.js"></script>
</body>
</html>
