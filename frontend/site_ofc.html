<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocAssist - Plataforma Universitária Inteligente</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #060913;
            --card-bg: rgba(15, 21, 35, 0.94);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --border-color: rgba(30, 41, 59, 0.95);
            --shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 32%);
            z-index: -1;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(6, 9, 19, 0.86);
            backdrop-filter: blur(14px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.22), rgba(56, 189, 248, 0.08));
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.28);
        }

        .brand-copy {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .brand-title {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .brand-subtitle {
            font-size: 0.84rem;
            color: var(--text-secondary);
        }

        .admin-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            font-size: 0.94rem;
            font-weight: 600;
        }

        .admin-link:hover {
            border-color: rgba(59, 130, 246, 0.42);
            background: rgba(59, 130, 246, 0.08);
        }

        main {
            padding: 26px 5% 56px;
        }

        .page-shell {
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            gap: 26px;
        }

        .carousel-hero {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            border: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(11, 18, 32, 0.98), rgba(15, 23, 42, 0.9));
            box-shadow: var(--shadow);
            padding: clamp(24px, 2.2vw, 32px);
        }

        .carousel-hero::after {
            content: '';
            position: absolute;
            inset: auto -12% -38% auto;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.18), transparent 68%);
            pointer-events: none;
        }

        .carousel-heading {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 24px;
            margin-bottom: 20px;
        }

        .carousel-title {
            font-size: clamp(1.75rem, 1.3rem + 1.5vw, 2.4rem);
            line-height: 1.08;
            letter-spacing: -0.03em;
            max-width: 760px;
        }

        .carousel-title span {
            color: #8be7ff;
        }

        .carousel-description {
            color: var(--text-secondary);
            max-width: 760px;
            font-size: 1rem;
            margin-top: 10px;
        }

        .carousel-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .carousel-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
        }

        .carousel-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(59, 130, 246, 0.08);
        }

        .carousel-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            transition: width 0.2s ease, background-color 0.2s ease;
        }

        .dot.active {
            width: 26px;
            background: var(--accent-blue);
        }

        .carousel-viewport {
            overflow: hidden;
            border-radius: 22px;
            padding: 2px;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.35s ease;
        }

        .carousel-slide {
            min-width: 100%;
            padding-right: 6px;
        }

        .carousel-card {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(280px, 1fr);
            gap: 20px;
            background: linear-gradient(180deg, rgba(14, 20, 35, 0.98), rgba(9, 14, 25, 0.98));
            border: 1px solid rgba(59, 130, 246, 0.12);
            border-radius: 22px;
            padding: 24px;
            min-height: 320px;
        }

        .carousel-card h3 {
            font-size: 1.35rem;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .carousel-copy {
            color: var(--text-secondary);
            font-size: 0.98rem;
        }

        .carousel-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .carousel-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-blue), #38bdf8);
            color: #ffffff;
            font-weight: 700;
            width: fit-content;
        }

        .carousel-link:hover {
            transform: translateY(-1px);
        }

        .empty-state {
            padding: 28px 24px;
            text-align: center;
            color: var(--text-secondary);
            border-radius: 20px;
            border: 1px dashed var(--border-color);
            background: rgba(255, 255, 255, 0.01);
        }

        @media (max-width: 900px) {
            .carousel-heading {
                flex-direction: column;
                align-items: start;
            }

            .carousel-card {
                grid-template-columns: 1fr;
            }

            .info-strip {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .site-header {
                flex-direction: column;
                align-items: start;
            }

            .carousel-title {
                font-size: 1.7rem;
            }

            .carousel-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <div class="brand-icon">
                <i class="fa-solid fa-file-lines"></i>
            </div>
            <div class="brand-copy">
                <div class="brand-title">DocAssist</div>
                <div class="brand-subtitle">Plataforma de documentos universitários</div>
            </div>
        </div>

        <a href="admin.html" class="admin-link">
            <i class="fa-solid fa-shield-halved"></i>
            Área Administrativa
        </a>
    </header>

    <main>
        <div class="page-shell">
            <section class="carousel-hero">
                <div class="carousel-heading">
                    <div>
                        <h1 class="carousel-title">Documentos universitários</h1>
                        <p class="carousel-description">Acesse os editais disponíveis e experimente o novo ChatBot para consulta inteligente</p>
                    </div>

                    <div class="carousel-actions">
                        <button type="button" class="carousel-btn" id="carouselPrev" aria-label="Editar anterior">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <div id="carouselDots" class="carousel-dots"></div>
                        <button type="button" class="carousel-btn" id="carouselNext" aria-label="Próximo edital">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>

                <div class="carousel-viewport">
                    <div id="carouselTrack" class="carousel-track"></div>
                </div>
            </section>

        </div>
    </main>

    <script>
    (function(){
        const API_BASE = 'http://localhost:3000';
        const track = document.getElementById('carouselTrack');
        const dots = document.getElementById('carouselDots');
        const prevBtn = document.getElementById('carouselPrev');
        const nextBtn = document.getElementById('carouselNext');

        if(!track || !dots || !prevBtn || !nextBtn) return;

        let currentIndex = 0;
        let timerId = null;

        function formatDate(value){
            if(!value) return 'Data indisponível';
            const date = new Date(value);
            if(Number.isNaN(date.getTime())) return 'Data indisponível';
            return date.toLocaleString('pt-BR');
        }

        function getStatusLabel(item){
            return item.processing ? 'Processando resumo' : 'Disponível para leitura';
        }

        function buildSlide(item){
            const summary = item.processing
                ? 'Resumo em processamento...'
                : (item.summary || 'Resumo ainda não disponível.');

            const slide = document.createElement('div');
            slide.className = 'carousel-slide';

            slide.innerHTML = `
                <article class="carousel-card">
                    <div>
                        <h3>${item.name || 'Documento PDF'}</h3>
                        <p class="carousel-copy">${summary}</p>

                        <div class="carousel-meta">
                            <i class="fa-regular fa-calendar"></i>
                            Enviado em ${formatDate(item.createdAt)}
                        </div>

                        <a class="carousel-link" href="${API_BASE}/documents/${item.id}/download" target="_blank" rel="noreferrer">
                            Ver edital
                            <i class="fa-solid fa-arrow-right"></i>
                        </a>
                    </div>
                </article>
            `;

            return slide;
        }

        function renderDots(count){
            dots.innerHTML = '';

            for(let i = 0; i < count; i += 1){
                const dot = document.createElement('button');
                dot.type = 'button';
                dot.className = `dot ${i === currentIndex ? 'active' : ''}`;
                dot.setAttribute('aria-label', `Ir para o edital ${i + 1}`);
                dot.addEventListener('click', () => goToSlide(i));
                dots.appendChild(dot);
            }
        }

        function updateDots(){
            const active = dots.querySelector('.active');
            if(active){
                active.classList.remove('active');
            }

            const currentDot = dots.children[currentIndex];
            if(currentDot){
                currentDot.classList.add('active');
            }
        }

        function goToSlide(index){
            const items = track.querySelectorAll('.carousel-slide');
            if(items.length === 0) return;

            currentIndex = (index + items.length) % items.length;
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            updateDots();
        }

        function nextSlide(){
            const items = track.querySelectorAll('.carousel-slide');
            if(items.length === 0) return;
            goToSlide(currentIndex + 1);
        }

        function prevSlide(){
            const items = track.querySelectorAll('.carousel-slide');
            if(items.length === 0) return;
            goToSlide(currentIndex - 1);
        }

        function startAutoPlay(){
            clearInterval(timerId);
            timerId = setInterval(nextSlide, 6000);
        }

        async function load(){
            try {
                const response = await fetch(API_BASE + '/documents');
                if(!response.ok) throw new Error('Não foi possível carregar os documentos.');

                const list = await response.json();
                renderList(list);
            } catch (error) {
                track.innerHTML = '<div class="empty-state">Não foi possível carregar os editais no momento.</div>';
                dots.innerHTML = '';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
            }
        }

        function renderList(list){
            track.innerHTML = '';
            dots.innerHTML = '';

            if(!Array.isArray(list) || list.length === 0){
                track.innerHTML = '<div class="empty-state">Nenhum edital disponível no momento.</div>';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }

            list.forEach(item => {
                track.appendChild(buildSlide(item));
            });

            renderDots(list.length);
            currentIndex = 0;
            goToSlide(0);
            prevBtn.disabled = false;
            nextBtn.disabled = false;
            startAutoPlay();
        }

        prevBtn.addEventListener('click', () => {
            prevSlide();
            startAutoPlay();
        });

        nextBtn.addEventListener('click', () => {
            nextSlide();
            startAutoPlay();
        });

        load();
        setInterval(load, 5000);
    })();
    </script>

</body>
</html>
