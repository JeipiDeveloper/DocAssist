<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocAssist - Plataforma Universitária Inteligente</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="page-site">
    <header class="site-header">
        <a href="site_ofc.html" class="brand-link">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-file-lines"></i>
                </div>
                <div class="brand-copy">
                    <div class="brand-title">DocAssist</div>
                    <div class="brand-subtitle">Plataforma de documentos universitários</div>
                </div>
            </div>
        </a>

        <a href="admin.html" class="admin-link">
            <i class="fa-solid fa-shield-halved"></i>
            Área Administrativa
        </a>
    </header>

    <main>
        <div class="page-shell">
            <section class="carousel-hero">
                <div class="carousel-heading">
                    <div>
                        <h1 class="carousel-title">Documentos universitários</h1>
                        <p class="carousel-description">Acesse os editais disponíveis e experimente o novo ChatBot para consulta inteligente</p>
                    </div>

                    <div class="carousel-actions">
                        <button type="button" class="carousel-btn" id="carouselPrev" aria-label="Editar anterior">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <div id="carouselDots" class="carousel-dots"></div>
                        <button type="button" class="carousel-btn" id="carouselNext" aria-label="Próximo edital">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>

                <div class="carousel-viewport">
                    <div id="carouselTrack" class="carousel-track"></div>
                </div>
            </section>

        </div>
    </main>

    <script src="assets/js/site.js"></script>

</body>
</html>
