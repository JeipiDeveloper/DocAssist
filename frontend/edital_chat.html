<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocAssist — Chatbot do Edital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="page-chat">
    <header class="site-header">
        <div class="brand">
            <div class="brand-icon">
                <i class="fa-solid fa-file-lines"></i>
            </div>
            <div class="brand-copy">
                <div class="brand-title">DocAssist</div>
                <div class="brand-subtitle">Chatbot do edital selecionado</div>
            </div>
        </div>
        <a href="site_ofc.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i>
            Voltar ao site
        </a>
    </header>

    <main class="page-shell">
        <div class="layout">
            <aside class="panel document-panel">
                <span class="status-pill" id="statusPill">Carregando edital...</span>

                <div>
                    <h1 id="documentTitle">Carregando...</h1>
                    <div class="meta-row" id="metaRow">
                        <span class="meta-chip"><i class="fa-regular fa-calendar"></i> <span id="documentDate">-</span></span>
                    </div>
                </div>

                <a href="#" id="downloadLink" class="document-action" target="_blank" rel="noreferrer">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    Abrir edital
                </a>

                <div class="summary-card" id="summaryCard">
                    <h2>Resumo do edital</h2>
                    <p id="summaryText">Carregando resumo...</p>
                </div>
            </aside>

            <section class="panel chat-panel">
                <div class="chat-header">
                    <h2>Converse com o DocAssist</h2>
                    <p class="chat-subtitle">Faça perguntas sobre o edital para obter respostas rápidas e confiáveis.</p>
                </div>

                <div class="chat-history" id="chatHistory">
                    <div class="message-row ai">
                        <div class="message-bubble loading">
                            Aguarde enquanto o edital é carregado.
                        </div>
                    </div>
                </div>

                <div class="suggested-questions" id="suggestedQuestions"></div>

                <div class="input-bar">
                    <form id="askForm" class="input-row">
                        <input id="promptInput" class="chat-input" type="text" placeholder="Digite sua pergunta sobre o edital..." autocomplete="off" />
                        <button type="submit" class="send-button" id="sendButton" aria-label="Enviar pergunta">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <script src="assets/js/edital_chat.js"></script>
</body>
</html>
