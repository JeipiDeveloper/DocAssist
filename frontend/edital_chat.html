<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocAssist — Chatbot do Edital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #060913;
            --card-bg: rgba(15, 21, 35, 0.94);
            --card-soft: rgba(11, 18, 32, 0.96);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --border-color: rgba(30, 41, 59, 0.95);
            --shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
            --success: #34d399;
            --warning: #f59e0b;
            --danger: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Inter", sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 32%);
            pointer-events: none;
            z-index: -1;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            padding: 16px 5%;
            background: rgba(6, 9, 19, 0.86);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(14px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.22), rgba(56, 189, 248, 0.08));
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.28);
        }

        .brand-copy {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .brand-title {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .brand-subtitle {
            font-size: 0.84rem;
            color: var(--text-secondary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            font-size: 0.94rem;
            font-weight: 600;
            transition: border-color 0.2s ease, background-color 0.2s ease, transform 0.2s ease;
        }

        .back-link:hover {
            border-color: rgba(59, 130, 246, 0.42);
            background: rgba(59, 130, 246, 0.08);
            transform: translateY(-1px);
        }

        .page-shell {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 5% 40px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
            gap: 22px;
            align-items: stretch;
        }

        .panel {
            background: linear-gradient(180deg, rgba(14, 20, 35, 0.98), rgba(9, 14, 25, 0.98));
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .document-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status-pill {
            align-self: flex-start;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            background: rgba(245, 158, 11, 0.12);
            color: var(--warning);
        }

        .status-pill.processing {
            background: rgba(59, 130, 246, 0.12);
            color: #93c5fd;
        }

        .status-pill.ready {
            background: rgba(52, 211, 153, 0.12);
            color: var(--success);
        }

        .document-panel h1 {
            font-size: 1.5rem;
            line-height: 1.2;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.92rem;
            color: var(--text-secondary);
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
        }

        .document-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-blue), #38bdf8);
            color: #ffffff;
            font-weight: 700;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .document-action:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .summary-card {
            padding: 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
        }

        .summary-card h2, .chat-header h2 {
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .summary-card p, .chat-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .summary-card p {
            white-space: pre-wrap;
        }

        .summary-card.empty {
            color: var(--text-secondary);
        }

        .chat-panel {
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 72vh;
        }

        .chat-header {
            padding: 24px 24px 18px;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .chat-history {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-row {
            display: flex;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ai {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: min(80%, 720px);
            padding: 14px 16px;
            border-radius: 18px;
            font-size: 0.96rem;
            line-height: 1.55;
            border: 1px solid rgba(59, 130, 246, 0.14);
        }

        .message-row.user .message-bubble {
            background: rgba(59, 130, 246, 0.16);
            border-color: rgba(59, 130, 246, 0.24);
        }

        .message-row.ai .message-bubble {
            background: rgba(255, 255, 255, 0.02);
        }

        .message-bubble.error {
            border-color: rgba(248, 113, 113, 0.28);
            color: #fecaca;
        }

        .message-bubble.loading {
            color: var(--text-secondary);
        }

        .suggested-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 24px 18px;
        }

        .suggestion-chip {
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .suggestion-chip:hover {
            border-color: rgba(59, 130, 246, 0.42);
            background: rgba(59, 130, 246, 0.08);
        }

        .input-bar {
            padding: 0 24px 24px;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px 12px 10px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
        }

        .input-row:focus-within {
            border-color: rgba(59, 130, 246, 0.42);
            box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.18);
        }

        .chat-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .send-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue), #38bdf8);
            color: #ffffff;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .send-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .send-button:disabled {
            opacity: 0.65;
            cursor: wait;
        }

        .empty-state {
            padding: 20px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            border: 1px dashed var(--border-color);
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .chat-panel {
                min-height: auto;
            }
        }

        @media (max-width: 640px) {
            .site-header {
                flex-direction: column;
                align-items: start;
            }

            .page-shell {
                padding: 20px 4% 32px;
            }

            .document-panel,
            .chat-header,
            .chat-history,
            .suggested-questions,
            .input-bar {
                padding-left: 18px;
                padding-right: 18px;
            }

            .input-row {
                border-radius: 22px;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <div class="brand-icon">
                <i class="fa-solid fa-file-lines"></i>
            </div>
            <div class="brand-copy">
                <div class="brand-title">DocAssist</div>
                <div class="brand-subtitle">Chatbot do edital selecionado</div>
            </div>
        </div>
        <a href="site_ofc.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i>
            Voltar ao site
        </a>
    </header>

    <main class="page-shell">
        <div class="layout">
            <aside class="panel document-panel">
                <span class="status-pill" id="statusPill">Carregando edital...</span>

                <div>
                    <h1 id="documentTitle">Carregando...</h1>
                    <div class="meta-row" id="metaRow">
                        <span class="meta-chip"><i class="fa-regular fa-calendar"></i> <span id="documentDate">-</span></span>
                    </div>
                </div>

                <a href="#" id="downloadLink" class="document-action" target="_blank" rel="noreferrer">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    Abrir edital
                </a>

                <div class="summary-card" id="summaryCard">
                    <h2>Resumo do edital</h2>
                    <p id="summaryText">Carregando resumo...</p>
                </div>
            </aside>

            <section class="panel chat-panel">
                <div class="chat-header">
                    <h2>Converse com o DocAssist</h2>
                    <p class="chat-subtitle">Faça perguntas sobre o edital para obter respostas rápidas e confiáveis.</p>
                </div>

                <div class="chat-history" id="chatHistory">
                    <div class="message-row ai">
                        <div class="message-bubble loading">
                            Aguarde enquanto o edital é carregado.
                        </div>
                    </div>
                </div>

                <div class="suggested-questions" id="suggestedQuestions"></div>

                <div class="input-bar">
                    <form id="askForm" class="input-row">
                        <input id="promptInput" class="chat-input" type="text" placeholder="Digite sua pergunta sobre o edital..." autocomplete="off" />
                        <button type="submit" class="send-button" id="sendButton" aria-label="Enviar pergunta">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <script>
        const API_BASE = "http://localhost:3000";
        const params = new URLSearchParams(window.location.search);
        const documentId = params.get("id");

        const statusPill = document.getElementById("statusPill");
        const documentTitle = document.getElementById("documentTitle");
        const documentDate = document.getElementById("documentDate");
        const downloadLink = document.getElementById("downloadLink");
        const summaryText = document.getElementById("summaryText");
        const summaryCard = document.getElementById("summaryCard");
        const chatHistory = document.getElementById("chatHistory");
        const suggestedQuestions = document.getElementById("suggestedQuestions");
        const askForm = document.getElementById("askForm");
        const promptInput = document.getElementById("promptInput");
        const sendButton = document.getElementById("sendButton");

        const suggestions = [
            "Quais são os requisitos principais?",
            "Qual é o período de inscrição?",
            "Quais documentos são necessários?",
            "Há cotas ou critérios especiais?"
        ];

        function formatDate(value) {
            if (!value) return "Data indisponível";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "Data indisponível";
            return date.toLocaleString("pt-BR");
        }

        function createBubble(role, text, extraClass = "") {
            const row = document.createElement("div");
            row.className = `message-row ${role}`;

            const bubble = document.createElement("div");
            bubble.className = `message-bubble ${extraClass}`;
            bubble.textContent = text;

            row.appendChild(bubble);
            chatHistory.appendChild(row);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function renderSuggestions() {
            suggestedQuestions.innerHTML = "";
            suggestions.forEach((item) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "suggestion-chip";
                button.textContent = item;
                button.addEventListener("click", () => {
                    promptInput.value = item;
                    promptInput.focus();
                });
                suggestedQuestions.appendChild(button);
            });
        }

        function setLoadingState(message) {
            chatHistory.innerHTML = "";
            createBubble("ai", message, "loading");
        }

        async function loadDocument() {
            if (!documentId) {
                setLoadingState("Nenhum edital foi selecionado. Volte ao site e abra um edital para iniciar o chat.");
                statusPill.textContent = "Edital não informado";
                statusPill.className = "status-pill";
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/documents`);
                if (!response.ok) {
                    throw new Error("Não foi possível carregar os editais.");
                }

                const documents = await response.json();
                const current = documents.find((item) => String(item.id) === String(documentId));

                if (!current) {
                    setLoadingState("Não foi possível localizar este edital no backend. Tente voltar ao site e clicar em outro edital.");
                    statusPill.textContent = "Edital não encontrado";
                    statusPill.className = "status-pill";
                    return;
                }

                documentTitle.textContent = current.name || "Documento sem título";
                documentDate.textContent = formatDate(current.createdAt);
                downloadLink.href = `${API_BASE}/documents/${current.id}/download`;

                if (current.processing) {
                    statusPill.textContent = "Processando resumo";
                    statusPill.className = "status-pill processing";
                    summaryText.textContent = "O resumo ainda está sendo gerado. Tente novamente em alguns instantes.";
                } else if (current.summary) {
                    statusPill.textContent = "Resumo disponível";
                    statusPill.className = "status-pill ready";
                    summaryText.textContent = current.summary;
                } else {
                    statusPill.textContent = "Resumo indisponível";
                    statusPill.className = "status-pill";
                    summaryText.textContent = "Ainda não há resumo disponível para este edital.";
                }

                chatHistory.innerHTML = "";
                createBubble("ai", `Olá! Vou te ajudar a entender o edital “${current.name || "este documento"}”. Faça sua pergunta quando quiser.`);
            } catch (error) {
                console.error(error);
                setLoadingState("Não foi possível conectar ao backend do DocAssist. Verifique se o servidor está rodando em http://localhost:3000.");
                statusPill.textContent = "Falha ao carregar";
                statusPill.className = "status-pill";
            }
        }

        async function sendQuestion(event) {
            event.preventDefault();
            const prompt = promptInput.value.trim();

            if (!prompt || !documentId) {
                return;
            }

            createBubble("user", prompt);
            promptInput.value = "";
            sendButton.disabled = true;
            createBubble("ai", "Consultando o documento...", "loading");

            try {
                const response = await fetch(`${API_BASE}/documents/${documentId}/ask`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ prompt })
                });

                const payload = await response.json();
                const answer = payload?.answer || payload?.message || "Não foi possível gerar uma resposta agora.";

                chatHistory.removeChild(chatHistory.lastElementChild);
                createBubble("ai", answer);
            } catch (error) {
                console.error(error);
                chatHistory.removeChild(chatHistory.lastElementChild);
                createBubble("ai", "Não foi possível responder agora. Tente novamente em instantes.", "error");
            } finally {
                sendButton.disabled = false;
                promptInput.focus();
            }
        }

        renderSuggestions();
        askForm.addEventListener("submit", sendQuestion);
        loadDocument();
    </script>
</body>
</html>
