<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocAssist - Área Administrativa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="page-admin">
    <header class="site-header">
        <a href="site_ofc.html" class="brand-link">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-file-lines"></i>
                </div>
                <div class="brand-copy">
                    <div class="brand-title">DocAssist</div>
                    <div class="brand-subtitle">Área Administrativa</div>
                </div>
            </div>
        </a>

        <nav>
            <a href="site_ofc.html" class="link-back">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar ao site
            </a>
        </nav>
    </header>

    <main class="admin-container">
        <div class="admin-card compact-admin-card">
            <div class="admin-copy-centered">
                <h2 class="admin-title">Área Administrativa</h2>
                <p class="small admin-subtitle">Faça o login para acessar o painel.</p>
            </div>

            <form class="login-form" id="loginForm">
                <label for="user">Usuário</label>
                <input id="user" name="user" placeholder="admin" autocomplete="username">

                <label for="pass">Senha</label>
                <input id="pass" name="password" type="password" placeholder="digite sua senha" autocomplete="current-password">

                <p id="loginError" class="small login-error" role="alert" hidden></p>

                <div class="form-actions">
                    <button type="submit" class="btn">Entrar</button>
                </div>
            </form>
        </div>
    </main>

    <script src="assets/js/admin.js"></script>
</body>
</html>
